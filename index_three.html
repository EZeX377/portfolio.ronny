<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Editor Animation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
    }
    
    body {
      overflow: hidden;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    #container {
      width: 100%;
      max-width: 52rem;
      aspect-ratio: 1;
      display: block;
    }
  </style>
</head>
<body>
  <div id="container"></div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const container = document.getElementById('container');
    const scene = new THREE.Scene();
    
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 10);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);
    renderer.domElement.style.display = 'block';
    renderer.domElement.style.width = '100%';
    renderer.domElement.style.height = '100%';
    container.style.overflow = 'hidden';
    
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);
    
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 5, 5);
    scene.add(directionalLight);
    
    const editorGroup = new THREE.Group();
    scene.add(editorGroup);
    
    function updateCameraForScreenSize() {
      const rect = container.getBoundingClientRect();
      const width = rect.width;
      const height = rect.height;
      const aspect = width / height;
      
      camera.aspect = aspect;
      camera.updateProjectionMatrix();
      
      renderer.setSize(width, height);
      
      let scale = 1;
      if (width < 400) {
        scale = 0.3;
      } else if (width < 600) {
        scale = 0.5;
      }
      
      editorGroup.scale.set(scale, scale, scale);
      
      const baseDistance = 10;
      const minDimension = Math.min(width, height);
      const scaleFactor = minDimension / 800;
      camera.position.z = baseDistance / Math.max(0.2, Math.min(scaleFactor, 0.8));
    }
    
    updateCameraForScreenSize();
    
    function createRoundedRect(width, height, radius) {
      const shape = new THREE.Shape();
      const x = width / 2;
      const y = height / 2;
      
      shape.moveTo(-x + radius, -y);
      shape.lineTo(x - radius, -y);
      shape.quadraticCurveTo(x, -y, x, -y + radius);
      shape.lineTo(x, y - radius);
      shape.quadraticCurveTo(x, y, x - radius, y);
      shape.lineTo(-x + radius, y);
      shape.quadraticCurveTo(-x, y, -x, y - radius);
      shape.lineTo(-x, -y + radius);
      shape.quadraticCurveTo(-x, -y, -x + radius, -y);
      
      return new THREE.ShapeGeometry(shape);
    }
    
    const editorBg = new THREE.Mesh(
      createRoundedRect(10, 7, 0.25),
      new THREE.MeshStandardMaterial({ color: 0x1e1e1e, roughness: 0.7 })
    );
    editorGroup.add(editorBg);
    
    const titleBar = new THREE.Mesh(
      createRoundedRect(9.98, 0.58, 0.25),
      new THREE.MeshStandardMaterial({ color: 0x1e1e1e, roughness: 0.7 })
    );
    titleBar.position.set(0, 3.2, 0.01);
    editorGroup.add(titleBar);
    
    for (let i = 0; i < 3; i++) {
      const dot = new THREE.Mesh(
        new THREE.CircleGeometry(0.07, 16),
        new THREE.MeshStandardMaterial({ 
          color: i === 0 ? 0xff5f56 : i === 1 ? 0xffbd2e : 0x27c93f 
        })
      );
      dot.position.set(-4.5 + i * 0.2, 3.2, 0.02);
      editorGroup.add(dot);
    }
    
    const sidebarCanvas = document.createElement('canvas');
    const sidebarCtx = sidebarCanvas.getContext('2d');
    sidebarCanvas.width = 512;
    sidebarCanvas.height = 1024;
    
    const sidebarTexture = new THREE.CanvasTexture(sidebarCanvas);
    const sidebarPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(1.92, 6),
      new THREE.MeshBasicMaterial({ 
        map: sidebarTexture, 
        transparent: false,
        side: THREE.DoubleSide
      })
    );
    sidebarPlane.position.set(-3.9, 0.1, 0.02);
    sidebarPlane.renderOrder = 1;
    editorGroup.add(sidebarPlane);
    
    function drawSidebar() {
      sidebarCtx.fillStyle = '#1e1e1e';
      sidebarCtx.fillRect(0, 0, sidebarCanvas.width, sidebarCanvas.height);
      
      sidebarCtx.font = 'bold 24px Arial';
      sidebarCtx.fillStyle = '#cccccc';
      sidebarCtx.fillText('EXPLORER', 20, 40);
      
      const folders = [
        { name: 'src', icon: '📁', level: 0, expanded: true },
        { name: 'components', icon: '📁', level: 1, expanded: true },
        { name: 'header.html', icon: '🌐', level: 2 },
        { name: 'footer.html', icon: '🌐', level: 2 },
        { name: 'styles', icon: '📁', level: 1, expanded: false },
        { name: 'main.html', icon: '🌐', level: 1 },
        { name: 'index.html', icon: '🌐', level: 0 },
        { name: 'package.json', icon: '📦', level: 0 },
        { name: 'README.md', icon: '📄', level: 0 }
      ];
      
      let y = 80;
      folders.forEach(function(item) {
        const indent = 20 + item.level * 30;
        
        if (item.expanded !== undefined) {
          sidebarCtx.fillStyle = '#cccccc';
          sidebarCtx.font = '20px Arial';
          sidebarCtx.fillText(item.expanded ? '▼' : '▶', indent, y);
        }
        
        sidebarCtx.font = '24px Arial';
        sidebarCtx.fillText(item.icon, indent + 25, y);
        
        sidebarCtx.font = '20px Arial';
        sidebarCtx.fillStyle = '#cccccc';
        sidebarCtx.fillText(item.name, indent + 55, y);
        
        y += 45;
      });
      
      sidebarTexture.needsUpdate = true;
    }
    
    drawSidebar();
    
    const htmlCode = `<nav>
  <div class="logo">
    <i class="fa fa-code"></i> MyBrand
  </div>

  <div class="menu">
    <a href="#home"><i class="fa fa-home"></i> Home</a>

    <div class="dropdown">
      <a href="#projects"><i class="fa fa-folder-open"></i> Projects ▾</a>
      <div class="dropdown-content">
        <a href="#web"><i class="fa fa-globe"></i> Web Design</a>
        <a href="#3d"><i class="fa fa-cube"></i> 3D Animation</a>
        <a href="#uiux"><i class="fa fa-pencil-ruler"></i> UI/UX</a>
        <a href="#branding"><i class="fa fa-bullhorn"></i> Branding</a>
        <a href="#marketing"><i class="fa fa-chart-line"></i> Marketing</a>
      </div>
    </div>

    <a href="#services"><i class="fa fa-cogs"></i> Services</a>

    <div class="dropdown">
      <a href="#resources"><i class="fa fa-book"></i> Resources ▾</a>
      <div class="dropdown-content">
        <a href="#blog"><i class="fa fa-blog"></i> Blog</a>
        <a href="#guides"><i class="fa fa-file-alt"></i> Guides</a>
        <a href="#tools"><i class="fa fa-wrench"></i> Tools</a>
        <a href="#case-studies"><i class="fa fa-lightbulb"></i> Case Studies</a>
      </div>
    </div>

    <a href="#about"><i class="fa fa-user"></i> About</a>
    <a href="#careers"><i class="fa fa-briefcase"></i> Careers</a>
  </div>

  <div class="right-section">
    <div class="search">
      <i class="fa fa-search"></i>
      <input type="text" placeholder="Search projects...">
    </div>

    <div class="dropdown lang">
      <a href="#"><i class="fa fa-globe"></i> EN ▾</a>
      <div class="dropdown-content">
        <a href="#">EN - English</a>
        <a href="#">FR - Français</a>
        <a href="#">DE - Deutsch</a>
        <a href="#">JP - 日本語</a>
      </div>
    </div>

    <div class="notifications">
      <i class="fa fa-bell"></i>
      <span class="badge">3</span>
    </div>

    <div class="dropdown profile">
      <a href="#profile">
        <img src="user.jpg" alt="User" class="avatar">
        <span>John</span> ▾
      </a>
      <div class="dropdown-content">
        <a href="#dashboard"><i class="fa fa-chart-bar"></i> Dashboard</a>
        <a href="#settings"><i class="fa fa-gear"></i> Settings</a>
        <a href="#logout"><i class="fa fa-sign-out-alt"></i> Logout</a>
      </div>
    </div>

    <button class="contact-btn"><i class="fa fa-envelope"></i> Contact</button>

    <div class="hamburger">
      <i class="fa fa-bars"></i>
    </div>
  </div>
</nav>`;

    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 2048;
    canvas.height = 1536;
    
    const codeTexture = new THREE.CanvasTexture(canvas);
    
    const codePlane = new THREE.Mesh(
      new THREE.PlaneGeometry(7.6, 6),
      new THREE.MeshBasicMaterial({ 
        map: codeTexture, 
        transparent: false,
        side: THREE.DoubleSide
      })
    );
    codePlane.position.set(1.2, 0.1, 0.03);
    codePlane.renderOrder = 1;
    editorGroup.add(codePlane);
    
    let currentText = '';
    let charIndex = 0;
    let lineIndex = 0;
    const lines = htmlCode.split('\n');
    
    const colors = {
      tag: '#569cd6',
      attribute: '#9cdcfe',
      string: '#ce9178',
      comment: '#6a9955',
      text: '#d4d4d4',
      keyword: '#c586c0'
    };
    
    let isTyping = true;
    let lastDrawTime = 0;
    const drawInterval = 16;
    
    function drawCode() {
      if (!ctx || !canvas) return;
      
      const now = Date.now();
      if (now - lastDrawTime < drawInterval && !isTyping) {
        return;
      }
      lastDrawTime = now;
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#1e1e1e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.font = '32px "Courier New", monospace';
      const lineHeight = 45;
      let y = 60;
      
      const displayLines = currentText.split('\n');
      
      displayLines.forEach(function(line, index) {
        const lineNum = (index + 1).toString();
        ctx.fillStyle = '#858585';
        ctx.textAlign = 'right';
        ctx.fillText(lineNum, 80, y);
        
        ctx.textAlign = 'left';
        let x = 120;
        
        const tokens = tokenizeLine(line);
        tokens.forEach(function(token) {
          ctx.fillStyle = token.color;
          ctx.fillText(token.text, x, y);
          x += ctx.measureText(token.text).width;
        });
        
        y += lineHeight;
      });
      
      if (isTyping && displayLines.length > 0 && lines && lineIndex < lines.length) {
        const lastLine = displayLines[displayLines.length - 1] || '';
        const cursorX = 120 + ctx.measureText(lastLine).width;
        const cursorY = 60 + (displayLines.length - 1) * lineHeight;
        
        const blinkSpeed = 530;
        if (Math.floor(Date.now() / blinkSpeed) % 2 === 0) {
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(cursorX, cursorY - 30, 3, 35);
        }
      }
      
      codeTexture.needsUpdate = true;
    }
    
    function tokenizeLine(line) {
      const tokens = [];
      
      const commentRegex = /<!--.*?-->/;
      if (commentRegex.test(line)) {
        tokens.push({ text: line, color: colors.comment });
        return tokens;
      }
      
      let i = 0;
      while (i < line.length) {
        if (line[i] === '<') {
          let tagEnd = line.indexOf('>', i);
          if (tagEnd === -1) tagEnd = line.length;
          
          const tagContent = line.substring(i, tagEnd + 1);
          let j = i;
          
          while (j <= tagEnd && j < line.length) {
            if (line[j] === '<' || line[j] === '/' && line[j-1] === '<') {
              let tagNameEnd = j + 1;
              if (line[j] === '/') tagNameEnd++;
              
              while (tagNameEnd < line.length && /[a-zA-Z0-9]/.test(line[tagNameEnd])) {
                tagNameEnd++;
              }
              
              tokens.push({ text: line.substring(j, tagNameEnd), color: colors.tag });
              j = tagNameEnd;
            } else if (/[a-zA-Z-]/.test(line[j]) && (j === 0 || line[j-1] === ' ' || line[j-1] === '\t')) {
              let attrEnd = j;
              while (attrEnd < line.length && /[a-zA-Z-]/.test(line[attrEnd])) {
                attrEnd++;
              }
              
              if (attrEnd < line.length && line[attrEnd] === '=') {
                tokens.push({ text: line.substring(j, attrEnd), color: colors.attribute });
                tokens.push({ text: '=', color: colors.text });
                j = attrEnd + 1;
                
                if (j < line.length && line[j] === '"') {
                  let stringEnd = line.indexOf('"', j + 1);
                  if (stringEnd === -1) stringEnd = line.length;
                  else stringEnd++;
                  
                  tokens.push({ text: line.substring(j, stringEnd), color: colors.string });
                  j = stringEnd;
                }
              } else {
                tokens.push({ text: line.substring(j, attrEnd), color: colors.text });
                j = attrEnd;
              }
            } else if (line[j] === '>' || line[j] === ' ' || line[j] === '\t') {
              tokens.push({ text: line[j], color: colors.tag });
              j++;
            } else {
              j++;
            }
          }
          
          i = tagEnd + 1;
        } else {
          let textEnd = line.indexOf('<', i);
          if (textEnd === -1) textEnd = line.length;
          
          if (textEnd > i) {
            tokens.push({ text: line.substring(i, textEnd), color: colors.text });
          }
          i = textEnd;
        }
      }
      
      if (tokens.length === 0) {
        tokens.push({ text: line, color: colors.text });
      }
      
      return tokens;
    }
    
    let isWaiting = false;
    let typingPaused = false;
    let pauseEndTime = 0;
    
    function getRandomPause() {
      return Math.random() < 0.15 ? Math.random() * 300 + 100 : 0;
    }
    
    function typeCode() {
      if (isWaiting) return;
      
      if (typingPaused) {
        if (Date.now() < pauseEndTime) {
          return;
        }
        typingPaused = false;
      }
      
      if (!lines || lineIndex >= lines.length) {
        isTyping = false;
        isWaiting = true;
        setTimeout(function() {
          currentText = '';
          charIndex = 0;
          lineIndex = 0;
          isTyping = true;
          isWaiting = false;
          drawCode();
        }, 1500);
        return;
      }
      
      const totalChars = htmlCode.length;
      const currentProgress = currentText.length;
      const progressPercent = (currentProgress / totalChars) * 100;
      
      if (progressPercent >= 80) {
        isTyping = false;
        isWaiting = true;
        setTimeout(function() {
          currentText = '';
          charIndex = 0;
          lineIndex = 0;
          isTyping = true;
          isWaiting = false;
          drawCode();
        }, 1500);
        return;
      }
      
      isTyping = true;
      const currentLine = lines[lineIndex] || '';
      
      if (charIndex < currentLine.length) {
        currentText += currentLine[charIndex];
        charIndex++;
        
        const pauseTime = getRandomPause();
        if (pauseTime > 0) {
          typingPaused = true;
          pauseEndTime = Date.now() + pauseTime;
        }
        
        drawCode();
      } else {
        if (lineIndex < lines.length - 1) {
          currentText += '\n';
        }
        lineIndex++;
        charIndex = 0;
        if (lineIndex < lines.length) {
          drawCode();
        }
      }
    }
    
    setInterval(typeCode, 50);
    
    drawCode();
    
    function animate() {
      requestAnimationFrame(animate);
      
      editorGroup.rotation.y = Math.sin(Date.now() * 0.0003) * 0.1;
      editorGroup.rotation.x = Math.sin(Date.now() * 0.0002) * 0.05;
      
      if (!isTyping) {
        drawCode();
      }
      
      renderer.render(scene, camera);
    }
    animate();
    
    window.addEventListener('resize', function() {
      updateCameraForScreenSize();
    });
  </script>
</body>
</html>
