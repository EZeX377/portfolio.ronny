<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Morph Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: transparent;
        }
        #main {
            width: 100%;
            height: 100vh;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-family: 'Arial', sans-serif;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
        .hidden-images {
            display: none;
        }
    </style>
</head>
<body>
    <div id="info">Web/Globe</div>
    <div id="main"></div>
    <div class="hidden-images">
        <img crossorigin="anonymous" src="https://cdn-icons-png.flaticon.com/512/1006/1006771.png" alt="globe">
        <img crossorigin="anonymous" src="https://cdn-icons-png.flaticon.com/512/732/732212.png" alt="html">
        <img crossorigin="anonymous" src="https://cdn-icons-png.flaticon.com/512/732/732190.png" alt="css">
        <img crossorigin="anonymous" src="https://cdn-icons-png.flaticon.com/512/5968/5968292.png" alt="js">
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let mainContainer,
            scene,
            renderer,
            camera,
            cameraLookAt = new THREE.Vector3(0, 0, 0),
            cameraTarget = new THREE.Vector3(0, 0, 800),
            windowWidth,
            windowHeight,
            windowHalfWidth,
            windowHalfHeight,
            mouseX = 0,
            mouseY = 0,
            colors = ['#00ffff', '#00ccff', '#0099ff', '#0066ff', '#3399ff'],
            graphics,
            currentGraphic = 0,
            graphicCanvas,
            gctx,
            canvasWidth = 240,
            canvasHeight = 240,
            graphicPixels,
            particles = [],
            graphicOffsetX = canvasWidth / 2,
            graphicOffsetY = canvasHeight / 2;

        // -----------------------
        // Particle class
        // -----------------------
        function Particle() {
            this.vx = Math.random() * 0.05;
            this.vy = Math.random() * 0.05;
        }

        Particle.prototype.init = function(i) {
            const particle = new THREE.Object3D();
            const geometryCore = new THREE.SphereGeometry(2, 4, 4);
            const materialCore = new THREE.MeshLambertMaterial({
                color: colors[i % colors.length]
            });

            const box = new THREE.Mesh(geometryCore, materialCore);
            box.geometry.__dirtyVertices = true;
            box.geometry.dynamic = true;

            const pos = getGraphicPos(graphicPixels[i]);
            particle.targetPosition = new THREE.Vector3(pos.x, pos.y, pos.z);

            particle.position.set(
                windowWidth * 0.5, 
                windowHeight * 0.5, 
                -10 * Math.random() + 20
            );
            randomPos(particle.position);

            for (let i = 0; i < box.geometry.vertices.length; i++) {
                box.geometry.vertices[i].x += -2 + Math.random() * 4;
                box.geometry.vertices[i].y += -2 + Math.random() * 4;
                box.geometry.vertices[i].z += -2 + Math.random() * 4;
            }

            particle.add(box);
            this.particle = particle;
        }

        Particle.prototype.updateRotation = function() {
            this.particle.rotation.x += this.vx;
            this.particle.rotation.y += this.vy;
        }

        Particle.prototype.updatePosition = function() {
            this.particle.position.lerp(this.particle.targetPosition, 0.1);
        }

        function updateParticles() {
            for (let i = 0, l = particles.length; i < l; i++) {
                particles[i].updateRotation();
                particles[i].updatePosition();
            }
        }

        // -----------------------
        // Position helpers
        // -----------------------
        const getGraphicPos = (pixel) => {
            const posX = (pixel.x - graphicOffsetX - Math.random() * 4 - 2) * 3;
            const posY = (pixel.y - graphicOffsetY - Math.random() * 4 - 2) * 3;
            const posZ = -20 * Math.random() + 40;

            return {x: posX, y: posY, z: posZ};
        }

        function randomPos(vector, outFrame = false) {
            const radius = outFrame ? (windowWidth * 2) : (windowWidth * -2);
            const centerX = 0;
            const centerY = 0;

            const r = windowWidth + radius * Math.random();
            const angle = Math.random() * Math.PI * 2;

            vector.x = centerX + r * Math.cos(angle);
            vector.y = centerY + r * Math.sin(angle);
            vector.z = Math.random() * windowWidth;
        }

        // -----------------------
        // Set particles
        // -----------------------
        const setParticles = () => {
            for (let i = 0; i < graphicPixels.length; i++) {
                if (particles[i]) {
                    const pos = getGraphicPos(graphicPixels[i]);
                    particles[i].particle.targetPosition.x = pos.x;
                    particles[i].particle.targetPosition.y = pos.y;
                    particles[i].particle.targetPosition.z = pos.z;
                } else {
                    const p = new Particle();
                    p.init(i);
                    scene.add(p.particle);
                    particles[i] = p;
                }
            }

            for (let i = graphicPixels.length; i < particles.length; i++) {
                randomPos(particles[i].particle.targetPosition, true);
            }

            console.log('Total Particles: ' + particles.length);
        }

        // -----------------------
        // Update graphic
        // -----------------------
        const updateGraphic = () => {
            const img = graphics[currentGraphic];
            gctx.clearRect(0, 0, canvasWidth, canvasHeight);
            gctx.drawImage(img, 0, 0, canvasWidth, canvasHeight);

            const gData = gctx.getImageData(0, 0, canvasWidth, canvasHeight).data;
            graphicPixels = [];

            for (let i = gData.length; i >= 0; i -= 4) {
                if (gData[i] === 0) {
                    const x = (i / 4) % canvasWidth;
                    const y = canvasHeight - Math.floor(Math.floor(i / canvasWidth) / 4);

                    if ((x && x % 1 === 0) && (y && y % 1 === 0)) {
                        graphicPixels.push({
                            x: x,
                            y: y
                        });
                    }
                }
            }

            for (let i = 0; i < particles.length; i++) {
                randomPos(particles[i].particle.targetPosition);
            }

            setTimeout(() => {
                setParticles();
            }, 500);
        }

        // -----------------------
        // Setup functions
        // -----------------------
        const initStage = () => {
            mainContainer = document.querySelector('#main');
            setWindowSize();
            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('mousemove', onMouseMove, false);
        }

        const initScene = () => {
            scene = new THREE.Scene();

            renderer = new THREE.WebGLRenderer({
                alpha: true,
                antialias: true
            });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(windowWidth, windowHeight);
            mainContainer.appendChild(renderer.domElement);

            scene.background = null;
        }

        const initCamera = () => {
            const fieldOfView = 75;
            const aspectRatio = windowWidth / windowHeight;
            const nearPlane = 1;
            const farPlane = 3000;
            camera = new THREE.PerspectiveCamera(
                fieldOfView,
                aspectRatio,
                nearPlane,
                farPlane
            );
            camera.position.z = 800;
        }

        const initCanvas = () => {
            graphicCanvas = document.createElement('canvas');
            graphicCanvas.width = canvasWidth;
            graphicCanvas.height = canvasHeight;
            gctx = graphicCanvas.getContext('2d');
            graphics = document.querySelectorAll('.hidden-images > img');
        }

        const initLights = () => {
            const shadowLight = new THREE.DirectionalLight(0xffffff, 2);
            shadowLight.position.set(20, 0, 10);
            scene.add(shadowLight);

            const light = new THREE.DirectionalLight(0xffffff, 1.5);
            light.position.set(-20, 0, 20);
            scene.add(light);

            const backLight = new THREE.DirectionalLight(0xffffff, 1);
            backLight.position.set(0, 0, -20);
            scene.add(backLight);
        }

        const onMouseMove = (event) => {
            mouseX = (event.clientX - windowHalfWidth);
            mouseY = (event.clientY - windowHalfHeight);
            cameraTarget.x = (mouseX * -1) / 2;
            cameraTarget.y = mouseY / 2;
        }

        const onWindowResize = () => {
            setWindowSize();
            camera.aspect = windowWidth / windowHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(windowWidth, windowHeight);
        }

        const setWindowSize = () => {
            windowWidth = window.innerWidth;
            windowHeight = window.innerHeight;
            windowHalfWidth = windowWidth / 2;
            windowHalfHeight = windowHeight / 2;
        }

        const animate = () => {
            requestAnimationFrame(animate);
            updateParticles();
            camera.position.lerp(cameraTarget, 0.2);
            camera.lookAt(cameraLookAt);
            renderer.render(scene, camera);
        }

        // -----------------------
        // Auto-play slideshow
        // -----------------------
        const startAutoPlay = () => {
            const shapeNames = ['Web/Globe', 'HTML5', 'CSS3', 'JavaScript'];
            
            setInterval(() => {
                currentGraphic = (currentGraphic + 1) % graphics.length;
                document.getElementById('info').textContent = shapeNames[currentGraphic];
                updateGraphic();
            }, 3000);
        }

        // -----------------------
        // Initialize
        // -----------------------
        const init = () => {
            initStage();
            initScene();
            initCanvas();
            initCamera();
            initLights();
            
            // Wait for images to load
            let loadedImages = 0;
            const totalImages = 4;
            
            graphics.forEach(img => {
                if (img.complete) {
                    loadedImages++;
                } else {
                    img.addEventListener('load', () => {
                        loadedImages++;
                        if (loadedImages === totalImages) {
                            updateGraphic();
                            startAutoPlay();
                        }
                    });
                }
            });
            
            if (loadedImages === totalImages) {
                updateGraphic();
                startAutoPlay();
            }
            
            animate();
        }

        init();
    </script>
</body>
</html>
